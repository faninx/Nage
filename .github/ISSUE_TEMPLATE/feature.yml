name: 功能建议
description: 提出新功能或改进
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      content: |
        想清楚「做什么」和「为什么」即可，「怎么做」留给实现者。

  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题
      placeholder: 你（或其他人）当前用 Nage 遇到了什么不顺
      validations:
        required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      placeholder: 描述你希望的功能行为
      validations:
        required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      placeholder: 你想过哪些其他实现？各自的取舍

  - type: textarea
    id: context
    attributes:
      label: 其他上下文
      placeholder: 截图、相关 issue、参考应用等
