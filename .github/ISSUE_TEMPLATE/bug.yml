name: Bug 报告
description: 报告一个明确的 bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      content: |
        谢谢你的反馈！请尽量提供完整信息，方便定位。

  - type: textarea
    id: what-happened
    attributes:
      label: 发生了什么
      placeholder: 简明描述 bug
      validations:
        required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望的行为
      placeholder: 你期望发生什么
      validations:
        required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开 ...
        2. 点击 ...
        3. 看到 ...
      validations:
        required: true

  - type: input
    id: version
    attributes:
      label: 版本
      placeholder: v1.0.0 / git commit
      validations:
        required: true

  - type: dropdown
    id: deploy
    attributes:
      label: 部署方式
      options:
        - Docker Compose
        - 本地 dev
        - 其他
      validations:
        required: true

  - type: textarea
    id: logs
    attributes:
      label: 浏览器/服务端日志
      placeholder: |
        浏览器 DevTools Console 截图、docker compose logs app 输出
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 拖入图片（如果适用）
