# 纳格（Nage）单机部署
# Nage 只听 :${APP_PORT:-3000}，反代由你自己解决（Caddy / Nginx / Cloudflare Tunnel 任选）
# 参考配置见 docs/examples/
#
# 启动：docker compose up -d --build
# 升级：docker compose pull && docker compose up -d（自建镜像则 docker compose build）
# 备份：bash scripts/backup.sh  或  crontab 调 scripts/backup.sh

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: nage:latest
    container_name: nage-app
    restart: unless-stopped
    # APP_PORT 贯通：.env 里改这一个，compose 主机端口 + 容器端口 + 应用监听端口都跟着变
    # 想换成 8080：.env 加 APP_PORT=8080，然后 docker compose up -d
    # 反代对应指向 127.0.0.1:${APP_PORT:-3000}
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    environment:
      NODE_ENV: production
      PORT: ${APP_PORT:-3000}
      HOSTNAME: 0.0.0.0
      ADMIN_USERNAME: ${ADMIN_USERNAME:?请在 .env 里设置 ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?请在 .env 里设置 ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?请在 .env 里设置 JWT_SECRET（最少 32 字节）}
    env_file:
      - path: ./.env
        required: true
    volumes:
      # SQLite 数据库 + 用户上传图片（v1.4.0+ M10 安全修复后，uploads 迁到 data/uploads/
      # 子目录，跟 DB 共享同一 volume；单独挂 uploads 反而绕过 route handler 鉴权）
      - nage-data:/app/data
      # 备份目录（容器内落地，外部访问通过 docker cp 或 volume 挂到主机）
      - nage-backups:/app/backups
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${APP_PORT:-3000}/login"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - nage-net
    # 备份时需要执行 sqlite3 .backup，必须能进容器
    # 常规运维：docker exec -it nage-app bash

volumes:
  nage-data:
  nage-backups:

networks:
  nage-net:
    driver: bridge