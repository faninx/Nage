# 纳格（Nage）Nginx 反向代理示例
#
# 用法：
#   1. 装 Nginx + certbot：apt install -y nginx certbot python3-certbot-nginx
#   2. 把这个文件复制为 /etc/nginx/sites-available/nage.conf
#   3. 把下面三处 nage.example.com 换成你的域名
#   4. sudo ln -s /etc/nginx/sites-available/nage.conf /etc/nginx/sites-enabled/
#   5. sudo nginx -t   # 验证配置
#   6. sudo certbot --nginx -d nage.example.com   # 申请 Let's Encrypt 证书（自动改配置）
#   7. sudo systemctl reload nginx
#
# 假设 docker-compose 已 up，应用监听在主机 127.0.0.1:3000
# （如果改了 docker-compose 的 APP_PORT，这里也要对应改）

# 上游（Nage 应用）
upstream nage_app {
    server 127.0.0.1:3000;
    keepalive 8;
}

# HTTP → HTTPS 强制重定向
server {
    listen 80;
    listen [::]:80;
    server_name nage.example.com;

    # certbot 用这个目录放 ACME 校验文件
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nage.example.com;

    # TLS 证书（certbot 会自动维护）
    ssl_certificate /etc/letsencrypt/live/nage.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nage.example.com/privkey.pem;

    # 现代 TLS 配置（参考 Mozilla intermediate）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # 上传大小上限（物品图片，默认 20MB；Nage 内部 sharp 会压到 1080p JPEG q80）
    # 必须跟 next.config.ts 里的 serverActions.bodySizeLimit 保持一致：
    # Nginx 先截的话,Next.js 看不到完整 body,会报 413。
    client_max_body_size 20M;

    # 代理超时（Next.js 编译首请求可能慢）
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_buffering off;

    location / {
        proxy_pass http://nage_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
    }
}